<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Pong Game Simulator
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Pong Game</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="game-container">
    <div class="score-board">
      <div class="player-score">
        <h3>Player 1</h3>
        <p class="score">{{ player1Score }}</p>
      </div>
      <div class="player-score">
        <h3>Player 2</h3>
        <p class="score">{{ player2Score }}</p>
      </div>
    </div>
    <canvas #gameCanvas class="game-canvas"></canvas>
    <div class="controls">
      <ion-button (click)="toggleGame()" [color]="isGameRunning ? 'danger' : 'primary'">
        {{ isGameRunning ? 'Pause' : 'Start' }}
      </ion-button>
      <ion-button (click)="resetGame()" color="secondary">
        Reset
      </ion-button>
    </div>
  </div>
</ion-content>
